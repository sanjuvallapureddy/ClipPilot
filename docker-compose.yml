# ClipPilot — full stack. redis-stack (vector search) + python services + dashboard.
# Engine runs the real pipeline (yt-dlp transcript + GPT moment detection). Video render
# (OpenShorts) and posting (Upload-Post) are added when those credentials are configured.
services:
  redis:
    image: redis/redis-stack:latest   # RediSearch + RedisJSON for idx:trends
    ports:
      - "6379:6379"
      - "8002:8001"                    # RedisInsight UI
    volumes:
      - redis-data:/data

  engine:                              # Lane C — OpenShorts wrapper (FastAPI)
    build: ./engine
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      - redis

  discovery_orchestrator:              # Lane A
    build: ./discovery_orchestrator
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OPENSHORTS_URL: http://engine:8001
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - engine

  performance:                         # Lane B
    build: ./performance
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  agent_chat:                          # Team chat — agent "Slack" (peer conversation)
    build: ./agent_chat
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  dashboard:                           # Lane D
    build: ./dashboard
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DISCOVERY_API_URL: http://discovery_orchestrator:8000
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - discovery_orchestrator

volumes:
  redis-data:
